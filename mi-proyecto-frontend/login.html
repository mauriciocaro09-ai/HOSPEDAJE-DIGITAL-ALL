<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hospedaje Digital - Acceso al sistema">
    <title>Login - Hospedaje Digital</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --login-bg: linear-gradient(180deg, #f6f7fb 0%, #ffffff 100%);
            --login-card: #15232b;
            --login-card-border: rgba(255, 255, 255, 0.06);
            --login-text: #0f172a;
            --login-muted: #b7c0c8;
            --login-accent: #ff8a3d;
            --login-shadow: 0 18px 50px rgba(15, 23, 42, 0.18);
        }

        body.login-body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-family, Inter, Arial, sans-serif);
            background: var(--login-bg);
            color: var(--login-text);
            padding: 24px;
        }

        .login-container {
            width: 100%;
            max-width: 460px;
        }

        .login-card {
            background: var(--login-card);
            color: #fff;
            border-radius: 18px;
            box-shadow: var(--login-shadow);
            border: 1px solid var(--login-card-border);
            padding: 32px 28px 24px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .login-header h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: -0.02em;
        }

        .login-header .subtitle {
            margin: 10px 0 0;
            color: var(--login-muted);
            font-size: 1rem;
        }

        .login-form {
            display: grid;
            gap: 18px;
        }

        .field {
            display: grid;
            gap: 8px;
        }

        .field label {
            font-size: 0.98rem;
            font-weight: 700;
            color: #fff;
        }

        .field input {
            width: 100%;
            padding: 14px 16px;
            border: 0;
            border-radius: 10px;
            background: #fff;
            color: #111827;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: box-shadow 0.2s ease, transform 0.2s ease;
        }

        .field input:focus {
            box-shadow: 0 0 0 3px rgba(255, 138, 61, 0.18);
        }

        .actions {
            padding-top: 4px;
        }

        .btn-login {
            width: 100%;
            border: 0;
            border-radius: 12px;
            padding: 14px 18px;
            background: var(--login-accent);
            color: #1f2937;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, filter 0.2s ease, opacity 0.2s ease;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            filter: brightness(1.02);
        }

        .btn-login:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            min-height: 1.2rem;
            margin: 2px 0 0;
            color: #ffb4a0;
            font-size: 0.95rem;
            text-align: center;
        }

        .login-footer {
            display: grid;
            gap: 10px;
            justify-items: center;
            margin-top: 20px;
            text-align: center;
        }

        .login-footer a {
            color: var(--login-muted);
            text-decoration: none;
            font-size: 0.95rem;
        }

        .login-footer a strong {
            color: #fff;
        }

        .login-footer .link-back {
            font-weight: 700;
        }

        .footer-link {
            appearance: none;
            background: transparent;
            border: 0;
            padding: 0;
            color: var(--login-muted);
            text-decoration: none;
            font: inherit;
            cursor: pointer;
        }

        .footer-link strong {
            color: #fff;
        }

        .modal-shell {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: rgba(8, 15, 20, 0.72);
                -webkit-backdrop-filter: blur(6px);
                backdrop-filter: blur(6px);
            z-index: 1000;
        }

        .modal-shell.hidden {
            display: none;
        }

        .modal-panel {
            position: relative;
            width: min(920px, 100%);
            max-height: min(92vh, 900px);
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
            background: #fff;
            animation: modalIn 0.22s ease-out;
        }

        .modal-panel-register {
            width: min(1000px, 100%);
            background: #1a2c3d;
        }

        .modal-panel-register .modal-close {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        .modal-panel-register .modal-close:hover {
            background: rgba(255, 255, 255, 0.28);
        }

        .modal-panel-recovery {
            width: min(520px, 100%);
            padding: 28px 24px 24px;
            background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
        }

        .modal-close {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 38px;
            height: 38px;
            border: 0;
            border-radius: 999px;
            background: rgba(21, 35, 43, 0.08);
            color: #15232b;
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 2;
        }

        .modal-iframe {
            display: block;
            width: 100%;
            height: min(92vh, 900px);
            border: 0;
            background: transparent;
        }

        .recovery-title {
            margin: 0 42px 10px 0;
            color: #0f172a;
            font-size: 1.55rem;
            line-height: 1.2;
        }

        .recovery-copy {
            margin: 0 0 18px;
            color: #52606d;
            line-height: 1.5;
        }

        .recovery-form {
            display: grid;
            gap: 14px;
        }

        .recovery-field {
            display: grid;
            gap: 8px;
        }

        .recovery-field label {
            color: #15232b;
            font-size: 0.98rem;
            font-weight: 700;
        }

        .recovery-field input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #d7e0e6;
            border-radius: 12px;
            font-size: 1rem;
            color: #0f172a;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .recovery-field input:focus {
            border-color: #ff8a3d;
            box-shadow: 0 0 0 3px rgba(255, 138, 61, 0.16);
        }

        .recovery-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 4px;
        }

        .btn-secondary,
        .btn-primary {
            border: 0;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.98rem;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-secondary {
            background: #e5eef5;
            color: #243746;
        }

        .btn-primary {
            background: #ff8a3d;
            color: #1f2937;
        }

        .recovery-message {
            min-height: 1.2rem;
            margin: 4px 0 0;
            color: #0f766e;
            font-size: 0.95rem;
        }

        .recovery-message.error {
            color: #b42318;
        }

        /* ── Panel de nueva contraseña (reset desde email) ── */
        #reset-panel {
            display: none;
        }
        #reset-panel.visible {
            display: block;
        }
        .reset-title {
            margin: 0 0 8px;
            font-size: 1.7rem;
            letter-spacing: -0.02em;
            text-align: center;
        }
        .reset-subtitle {
            margin: 0 0 22px;
            color: var(--login-muted);
            font-size: 0.97rem;
            text-align: center;
        }
        .reset-form {
            display: grid;
            gap: 16px;
        }
        .reset-message {
            min-height: 1.2rem;
            margin: 2px 0 0;
            font-size: 0.95rem;
            text-align: center;
            color: #6ee7b7;
        }
        .reset-message.error { color: #ffb4a0; }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @media (max-width: 520px) {
            body.login-body {
                padding: 16px;
            }

            .login-card {
                padding: 26px 18px 20px;
                border-radius: 16px;
            }

            .login-header h1 {
                font-size: 1.7rem;
            }
        }
    </style>
</head>

<body class="login-body">
    <div class="login-container">
        <div class="login-card" role="dialog" aria-modal="true" aria-labelledby="login-title">
            <header class="login-header">
                <h1 id="login-title">Hospedaje Digital</h1>
                <p class="subtitle">Ingresa a tu cuenta</p>
            </header>

            <form class="login-form" id="login-form">
                <div class="field">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="admin@hotel.com" autocomplete="username" required>
                </div>

                <div class="field">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
                </div>

                <div class="actions">
                    <button type="submit" class="btn-login" id="btn-login">Iniciar Sesión</button>
                </div>

                <p id="error" class="error-message" role="alert" aria-live="polite"></p>
            </form>

            <footer class="login-footer">
                <button type="button" class="footer-link" id="open-register-modal">¿No tienes cuenta? <strong>Regístrate aquí</strong></button>
                <button type="button" class="footer-link" id="open-recovery-modal">🔒 ¿Olvidaste tu contraseña?</button>
                <a href="pages/landingpage.html" class="link-back">← Volver</a>
            </footer>
        </div>
    </div>

    <!-- PANEL: Nueva contraseña (se muestra cuando llega con ?reset-token en la URL) -->
    <div class="login-container" id="reset-panel">
        <div class="login-card">
            <h1 class="reset-title">Nueva contraseña</h1>
            <p class="reset-subtitle">Ingresa y confirma tu nueva contraseña.</p>
            <form class="reset-form" id="reset-form">
                <div class="field">
                    <label for="reset-password">Nueva contraseña</label>
                    <input type="password" id="reset-password" placeholder="••••••••" autocomplete="new-password" required>
                </div>
                <div class="field">
                    <label for="reset-password2">Confirmar contraseña</label>
                    <input type="password" id="reset-password2" placeholder="••••••••" autocomplete="new-password" required>
                </div>
                <div class="actions">
                    <button type="submit" class="btn-login" id="btn-reset">Guardar contraseña</button>
                </div>
                <p id="reset-message" class="reset-message" role="alert" aria-live="polite"></p>
            </form>
        </div>
    </div>

    <div class="modal-shell hidden" id="register-modal" aria-hidden="true">
        <div class="modal-panel modal-panel-register" role="dialog" aria-modal="true" aria-labelledby="register-modal-title">
            <button type="button" class="modal-close" data-close-modal="register-modal" aria-label="Cerrar registro">×</button>
            <iframe class="modal-iframe" id="register-frame" src="pages/register.html" title="Formulario de registro"></iframe>
        </div>
    </div>

    <div class="modal-shell hidden" id="recovery-modal" aria-hidden="true">
        <div class="modal-panel modal-panel-recovery" role="dialog" aria-modal="true" aria-labelledby="recovery-modal-title">
            <button type="button" class="modal-close" data-close-modal="recovery-modal" aria-label="Cerrar recuperación">×</button>
            <h2 class="recovery-title" id="recovery-modal-title">Recuperar contraseña</h2>
                    <p class="recovery-copy">Escribe el correo asociado a tu cuenta y te enviaremos un enlace para crear una nueva contraseña. El enlace expira en 30 minutos.</p>

            <form class="recovery-form" id="recovery-form">
                <div class="recovery-field">
                    <label for="recovery-email">Correo electrónico</label>
                    <input type="email" id="recovery-email" name="recovery-email" placeholder="admin@hotel.com" autocomplete="email" required>
                </div>

                <p id="recovery-message" class="recovery-message" role="status" aria-live="polite"></p>

                <div class="recovery-actions">
                    <button type="button" class="btn-secondary" data-close-modal="recovery-modal">Cancelar</button>
                    <button type="submit" class="btn-primary">Enviar enlace</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/login.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const registerModal = document.getElementById('register-modal');
            const recoveryModal = document.getElementById('recovery-modal');
            const recoveryForm = document.getElementById('recovery-form');
            const recoveryMessage = document.getElementById('recovery-message');
            const registerButton = document.getElementById('open-register-modal');
            const recoveryButton = document.getElementById('open-recovery-modal');

            const openModal = (modalElement) => {
                if (!modalElement) return;
                modalElement.classList.remove('hidden');
                modalElement.setAttribute('aria-hidden', 'false');
                document.body.style.overflow = 'hidden';
            };

            const closeModal = (modalElement) => {
                if (!modalElement) return;
                modalElement.classList.add('hidden');
                modalElement.setAttribute('aria-hidden', 'true');
                document.body.style.overflow = '';
            };

            registerButton?.addEventListener('click', () => openModal(registerModal));
            recoveryButton?.addEventListener('click', () => openModal(recoveryModal));

            window.addEventListener('message', (event) => {
                if (!event?.data || event.data.type !== 'register-success') {
                    return;
                }

                closeModal(registerModal);

                const registerFrame = document.getElementById('register-frame');
                if (registerFrame) {
                    registerFrame.src = registerFrame.src;
                }

                if (typeof showToast === 'function') {
                    showToast('Registro exitoso. Ya puedes iniciar sesión.', 'success');
                }
            });

            document.querySelectorAll('[data-close-modal]').forEach((button) => {
                button.addEventListener('click', () => {
                    closeModal(document.getElementById(button.getAttribute('data-close-modal')));
                });
            });

            [registerModal, recoveryModal].forEach((modalElement) => {
                modalElement?.addEventListener('click', (event) => {
                    if (event.target === modalElement) {
                        closeModal(modalElement);
                    }
                });
            });

            document.addEventListener('keydown', (event) => {
                if (event.key === 'Escape') {
                    closeModal(registerModal);
                    closeModal(recoveryModal);
                }
            });

                // ── Detectar token de reset en la URL ──────────────────
            const urlParams = new URLSearchParams(window.location.search);
            const resetToken = urlParams.get('reset-token');

            if (resetToken) {
                // Ocultar login normal y mostrar panel de nueva contraseña
                document.querySelector('.login-container:not(#reset-panel)')?.style.setProperty('display', 'none');
                document.getElementById('reset-panel')?.classList.add('visible');

                document.getElementById('reset-form')?.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const msg     = document.getElementById('reset-message');
                    const btn     = document.getElementById('btn-reset');
                    const pass1   = document.getElementById('reset-password').value.trim();
                    const pass2   = document.getElementById('reset-password2').value.trim();

                    msg.classList.remove('error');
                    msg.textContent = '';

                    if (!pass1 || !pass2) { msg.textContent = 'Completa ambos campos.'; msg.classList.add('error'); return; }
                    if (pass1 !== pass2)  { msg.textContent = 'Las contraseñas no coinciden.'; msg.classList.add('error'); return; }
                    if (pass1.length < 4) { msg.textContent = 'Mínimo 4 caracteres.'; msg.classList.add('error'); return; }

                    btn.disabled = true;
                    btn.textContent = 'Guardando...';

                    try {
                        const res  = await fetch(`${obtenerBaseApi()}/auth/reset-password`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ token: resetToken, nuevaContrasena: pass1 })
                        });
                        const data = await res.json();
                        if (!res.ok) throw new Error(data.error || 'Error al restablecer');

                        msg.textContent = '✓ ' + (data.mensaje || 'Contraseña actualizada. Redirigiendo...');
                        setTimeout(() => { window.location.href = 'login.html'; }, 2500);
                    } catch (err) {
                        msg.textContent = err.message;
                        msg.classList.add('error');
                        btn.disabled = false;
                        btn.textContent = 'Guardar contraseña';
                    }
                });
            }

            recoveryForm?.addEventListener('submit', async (event) => {
                event.preventDefault();

                const emailInput = document.getElementById('recovery-email');
                const email = emailInput?.value.trim() || '';

                if (!email) {
                    if (recoveryMessage) {
                        recoveryMessage.textContent = 'Debes escribir un correo válido.';
                        recoveryMessage.classList.add('error');
                    }
                    return;
                }

                if (recoveryMessage) {
                    recoveryMessage.textContent = 'Procesando solicitud...';
                    recoveryMessage.classList.remove('error');
                }

                try {
                    const response = await fetch(`${obtenerBaseApi()}/auth/forgot-password`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ Email: email })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error || data.message || 'No se pudo procesar la recuperación');
                    }

                    if (recoveryMessage) {
                        recoveryMessage.textContent = data.mensaje || 'Revisa tu correo, te enviamos el enlace.';
                        recoveryMessage.classList.remove('error');
                    }

                    if (typeof showToast === 'function') {
                        showToast(data.mensaje || 'Enlace enviado. Revisa tu correo.', 'success');
                    }

                    recoveryForm.reset();
                } catch (error) {
                    if (recoveryMessage) {
                        recoveryMessage.textContent = error.message;
                        recoveryMessage.classList.add('error');
                    }

                    if (typeof showToast === 'function') {
                        showToast(error.message, 'error');
                    }
                }
            });
        });
    </script>
</body>

</html>
