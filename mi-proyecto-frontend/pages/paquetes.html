<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Administración de Paquetes - Hospedaje Digital">
    <title>Paquetes - Hospedaje Digital</title>
    
    <!-- Estilos CSS -->
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/crud-base.css">
    <link rel="stylesheet" href="../css/modals.css">
    <link rel="stylesheet" href="../css/crud-paquetes.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* Ajuste de amplitud para el modal de paquetes */
        #modal-paquete .crud-modal-content {
            width: min(850px, 95%);
            padding: 2.5rem;
        }
        .crud-paquetes-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .form-row-2 {
            gap: 2rem;
        }
    </style>
    <link rel="icon" href="../assets/images/favicon.svg" type="image/svg+xml">
    <!-- Inline favicon to avoid /favicon.ico request from dev servers -->
    <link rel="shortcut icon" href="data:image/svg+xml;utf8,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2016%2016'%3E%3Crect%20fill='%230ea5a4'%20width='16'%20height='16'%20rx='3'/%3E%3Ctext%20x='8'%20y='12'%20font-size='10'%20text-anchor='middle'%20fill='%23fff'%20font-family='Arial'%20font-weight='700'%3EH%3C/text%3E%3C/svg%3E" type="image/svg+xml">
</head>
<body>
    <!-- ============================================
         HEADER Y NAVEGACIÓN
    ============================================ -->
    <header>
        <nav>
            <a href="../index.html" class="nav-back" aria-label="Volver al inicio">
                <i class="fa-solid fa-arrow-left"></i> Volver
            </a>
            <h1><i class="fa-solid fa-box"></i> Gestión de Paquetes</h1>
        </nav>
    </header>

    <!-- ============================================
         CONTENIDO PRINCIPAL
    ============================================ -->
    <main class="main-content">
        <!-- Toolbar -->
        <section class="crud-paquetes-toolbar">
            <button type="button" class="btn-accion-crud btn-accion-principal" id="btn-nuevo-paquete" aria-label="Crear nuevo paquete">
                <i class="fa-solid fa-plus"></i> NUEVO PAQUETE
            </button>
            <div id="mensaje-paquete" class="crud-paquetes-mensaje" aria-live="polite" role="status"></div>
        </section>

        <!-- Resumen/Estadísticas -->
        <div class="crud-paquetes-summary">
            <article>
                <span>Total</span>
                <strong id="paquetes-total">0</strong>
            </article>
            <article>
                <span>Activos</span>
                <strong id="paquetes-activos">0</strong>
            </article>
            <article>
                <span>Inactivos</span>
                <strong id="paquetes-inactivos">0</strong>
            </article>
        </div>

        <!-- Panel con filtros y tabla -->
        <div class="crud-paquetes-layout">
            <section class="crud-paquetes-panel crud-paquetes-panel-lista">
                <!-- Filtros -->
                <div class="crud-paquetes-lista-top">
                    <div class="crud-paquetes-filtros">
                        <input 
                            type="search" 
                            id="busqueda-paquetes" 
                            class="crud-paquetes-busqueda"
                            placeholder="Buscar paquete..."
                            aria-label="Buscar paquetes"
                        >
                        <select id="filtro-estado-paquetes" class="crud-paquetes-select" aria-label="Filtrar paquetes por estado">
                            <option value="all">Todos</option>
                            <option value="active">Activos</option>
                            <option value="inactive">Inactivos</option>
                        </select>
                    </div>
                </div>

                <!-- Tabla -->
                <div class="crud-paquetes-tabla-wrap">
                    <table class="crud-paquetes-tabla">
                        <thead>
                            <tr>
                                <th>Imagen</th>
                                <th>Nombre</th>
                                <th>Descripción</th>
                                <th>Precio</th>
                                <th>Duración</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-paquetes">
                            <tr>
                                <td colspan="7" class="mensaje-vacio">Cargando paquetes...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Paginación -->
                <div id="paginacion-paquetes" class="pagination-controls hidden"></div>
            </section>
        </div>
    </main>

    <!-- ============================================
         MODAL - CREAR/EDITAR PAQUETE
    ============================================ -->
    <div id="modal-paquete" class="crud-modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-paquete-titulo">
        <div class="crud-modal-content">
            <button type="button" class="crud-modal-close" id="btn-cerrar-modal-paquete" aria-label="Cerrar formulario">&times;</button>
            <h4 id="modal-paquete-titulo">Crear paquete</h4>
            <p class="crud-paquetes-note">Completa los datos del paquete y selecciona los servicios incluidos.</p>
            <div id="mensaje-paquete-modal" class="crud-paquetes-mensaje" aria-live="polite" role="status"></div>

            <form id="formulario-paquete" class="crud-paquetes-form">
                <!-- Nombre -->
                <label>
                    <span>Nombre <span class="campo-obligatorio" aria-hidden="true">*</span></span>
                    <input 
                        type="text" 
                        id="paquete-nombre" 
                        name="NombrePaquete"
                        required 
                        maxlength="150"
                        placeholder="Ej: Paquete Romántico"
                    >
                </label>

                <!-- Descripción -->
                <label>
                    <span>Descripción</span>
                    <textarea 
                        id="paquete-descripcion" 
                        name="Descripcion"
                        maxlength="500"
                        placeholder="Describe los detalles del paquete..."
                        rows="3"
                    ></textarea>
                </label>

                <!-- Precio y Duración (2 columnas) -->
                <div class="form-row-2">
                    <label>
                        <span>Precio <span class="campo-obligatorio" aria-hidden="true">*</span></span>
                        <input 
                            type="number" 
                            id="paquete-precio" 
                            name="PrecioPaquete"
                            required 
                            min="0" 
                            step="1000"
                            placeholder="0"
                        >
                    </label>

                    <label>
                        <span>Duración (noches) <span class="campo-obligatorio" aria-hidden="true">*</span></span>
                        <input 
                            type="number" 
                            id="paquete-duracion" 
                            name="DuracionNoches"
                            required 
                            min="1" 
                            value="1"
                        >
                    </label>
                </div>

                <!-- Incluir Habitación -->
                <label class="checkbox-label">
                    <input 
                        type="checkbox" 
                        id="paquete-incluir-habitacion" 
                        name="IncluirHabitacion"
                        checked
                    >
                    <span>Incluye alojamiento</span>
                </label>

                <!-- Imagen -->
                <label>
                    <span>URL de Imagen</span>
                    <input type="text" id="paquete-imagen" name="Imagen" placeholder="https://...">
                </label>
                <img id="paquete-imagen-preview" src="" alt="Preview" class="imagen-preview">

                <!-- Estado -->
                <label>
                    <span>Estado</span>
                    <select id="paquete-estado" name="Estado">
                        <option value="1">Activo</option>
                        <option value="0">Inactivo</option>
                    </select>
                </label>

                <!-- Servicios -->
                <div class="servicios-section">
                    <label>
                        <span>Servicios Incluidos</span>
                    </label>
                    <div id="lista-servicios-paquete" class="crud-paquetes-servicios-grid">
                        <!-- Se llenará dinámicamente -->
                    </div>
                </div>

                <!-- Botones -->
                <div class="crud-paquetes-form-actions">
                    <button type="submit" class="btn-accion-crud btn-accion-principal" id="btn-guardar-paquete">
                        <i class="fa-solid fa-check"></i> Guardar paquete
                    </button>
                    <button type="button" class="btn-accion-crud btn-accion-secundaria" id="btn-cancelar-paquete">
                        <i class="fa-solid fa-times"></i> Cancelar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- ============================================
         MODAL - DETALLES Y SERVICIOS
    ============================================ -->
    <div id="modal-paquete-detalles" class="crud-modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-detalles-titulo">
        <div class="crud-modal-content crud-modal-lg">
            <button type="button" class="crud-modal-close" id="btn-cerrar-detalles" aria-label="Cerrar detalles">&times;</button>
            <h4 id="modal-detalles-titulo">Detalles del Paquete</h4>

            <div class="crud-paquetes-detalles">
                <div class="detalles-header">
                    <img id="detalles-imagen" src="" alt="Paquete" class="detalles-imagen">
                    <div class="detalles-info">
                        <h3 id="detalles-nombre"></h3>
                        <p id="detalles-descripcion"></p>
                        <div class="detalles-meta">
                            <span class="precio-badge" id="detalles-precio"></span>
                            <span class="duracion-badge" id="detalles-duracion"></span>
                        </div>
                    </div>
                </div>

                <div class="detalles-servicios">
                    <h4>Servicios Incluidos</h4>
                    <div id="detalles-servicios" class="servicios-lista">
                        <!-- Se llenará dinámicamente -->
                    </div>
                </div>
            </div>

            <div class="crud-paquetes-form-actions">
                <button type="button" class="btn-accion-crud btn-accion-secundaria" id="btn-cerrar-detalles-btn">
                    Cerrar
                </button>
            </div>
        </div>
    </div>

    <!-- ============================================
         SCRIPTS
    ============================================ -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/modal.js"></script>
    <script src="../js/validation.js"></script>
    <script src="../js/toast.js"></script>
    <script>
        (function(){
            const s = document.createElement('script');
            s.src = '../js/paquetes.js?v=' + Date.now();
            s.defer = true;
            document.body.appendChild(s);
        })();
    </script>
</body>
</html>
