<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Hospedaje Digital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --primary: #1a2744;
            --accent:  #f59e0b;
            --accent2: #ef6c00;
            --fondo:   #f1f5f9;
            --card:    #ffffff;
            --texto:   #1e293b;
            --muted:   #64748b;
            --borde:   #e2e8f0;
            --input-bg:#f8fafc;
            --success: #10b981;
            --danger:  #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; scrollbar-width: none; -ms-overflow-style: none; }
        *::-webkit-scrollbar { display: none; }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: var(--fondo);
            color: var(--texto);
            min-height: 100vh;
            overflow-y: auto;
        }

        /* ── TOPBAR ── */
        .topbar {
            background: #1a2744;
            color: #fff;
            height: 58px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,.18);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-back {
            background: rgba(255,255,255,.12);
            border: none;
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            transition: background .2s;
            flex-shrink: 0;
        }
        .topbar-back:hover { background: rgba(255,255,255,.22); }

        .topbar-title {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: .3px;
        }

        /* ── LAYOUT ── */
        .page {
            max-width: 720px;
            margin: 0 auto;
            padding: 28px 16px 48px;
        }

        /* ── AVATAR HERO ── */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #2d4a8a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: 800;
            color: #fff;
            box-shadow: 0 4px 18px rgba(26,39,68,.3);
            border: 3px solid #fff;
        }

        .hero-name {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
        }

        .hero-role {
            background: #fff7ed;
            color: var(--accent2);
            border: 1px solid #fed7aa;
            border-radius: 20px;
            padding: 3px 14px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        /* ── CARD ── */
        .card {
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 2px 16px rgba(0,0,0,.07);
            border: 1px solid var(--borde);
            overflow: hidden;
            margin-bottom: 16px;
        }

        .card-header {
            padding: 16px 22px 14px;
            border-bottom: 1px solid var(--borde);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-header i {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: #eff6ff;
            color: #3b82f6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .card-header i.orange { background: #fff7ed; color: var(--accent2); }
        .card-header i.green  { background: #f0fdf4; color: var(--success); }

        .card-header h3 {
            font-size: 14px;
            font-weight: 700;
            color: var(--primary);
        }

        .card-body {
            padding: 20px 22px;
        }

        /* ── GRID ── */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .field { display: flex; flex-direction: column; gap: 5px; }
        .field.full { grid-column: 1 / -1; }

        .label {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: .4px;
        }

        /* ── VISTA LECTURA ── */
        .value {
            background: var(--input-bg);
            border: 1px solid var(--borde);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 600;
            color: var(--texto);
            min-height: 42px;
            display: flex;
            align-items: center;
        }

        /* ── INPUTS EDICIÓN ── */
        .input {
            background: var(--input-bg);
            border: 1.5px solid var(--borde);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 500;
            color: var(--texto);
            width: 100%;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
            min-height: 42px;
        }

        .input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,.12);
            background: #fff;
        }

        .input[readonly] {
            background: #f1f5f9;
            color: var(--muted);
            cursor: not-allowed;
        }

        /* ── BOTONES ── */
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all .2s;
            min-height: 42px;
        }

        .btn-primary {
            background: var(--accent);
            color: #1a2744;
            flex: 1;
            justify-content: center;
        }
        .btn-primary:hover { background: #d97706; }

        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--borde);
            color: var(--muted);
            flex: 1;
            justify-content: center;
        }
        .btn-outline:hover { background: var(--fondo); color: var(--texto); }

        .btn-danger {
            background: #fee2e2;
            color: var(--danger);
            border: 1.5px solid #fecaca;
            flex: 1;
            justify-content: center;
        }
        .btn-danger:hover { background: #fecaca; }

        .btn-success {
            background: #d1fae5;
            color: #065f46;
            border: 1.5px solid #a7f3d0;
            flex: 1;
            justify-content: center;
        }
        .btn-success:hover { background: #a7f3d0; }

        /* ── MENSAJES ── */
        .msg {
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 600;
            display: none;
            margin-bottom: 14px;
        }
        .msg.info    { display: block; background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
        .msg.success { display: block; background: #f0fdf4; color: #065f46; border: 1px solid #a7f3d0; }
        .msg.error   { display: block; background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

        /* ── SEPARADOR ── */
        .sep {
            border: none;
            border-top: 1px solid var(--borde);
            margin: 18px 0;
        }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            .field.full { grid-column: auto; }
            .btn-row { flex-direction: column; }
            .btn { flex: none; width: 100%; }
        }
    </style>
</head>
<body>

    <header class="topbar">
        <button type="button" class="topbar-back" id="btn-volver" aria-label="Volver">
            <i class="fa-solid fa-arrow-left"></i>
        </button>
        <span class="topbar-title"><i class="fa-solid fa-hotel" style="margin-right:7px;"></i>Hospedaje Digital</span>
    </header>

    <main class="page">

        <!-- HERO -->
        <div class="hero">
            <div class="avatar" id="avatar-iniciales">?</div>
            <div class="hero-name" id="hero-nombre">Cargando...</div>
            <span class="hero-role" id="hero-rol">—</span>
        </div>

        <!-- MENSAJE GLOBAL -->
        <div id="msg-global" class="msg"></div>

        <!-- CARD: DATOS PERSONALES (LECTURA) -->
        <div class="card" id="card-lectura">
            <div class="card-header">
                <i class="fa-solid fa-user orange"></i>
                <h3>Información personal</h3>
            </div>
            <div class="card-body">
                <div class="grid">
                    <div class="field">
                        <span class="label">Tipo de documento</span>
                        <span class="value" id="view-tipo">-</span>
                    </div>
                    <div class="field">
                        <span class="label">Número de documento</span>
                        <span class="value" id="view-numero">-</span>
                    </div>
                    <div class="field">
                        <span class="label">Nombre</span>
                        <span class="value" id="view-nombre">-</span>
                    </div>
                    <div class="field">
                        <span class="label">Apellido</span>
                        <span class="value" id="view-apellido">-</span>
                    </div>
                    <div class="field">
                        <span class="label">Teléfono</span>
                        <span class="value" id="view-telefono">-</span>
                    </div>
                    <div class="field">
                        <span class="label">País</span>
                        <span class="value" id="view-pais">-</span>
                    </div>
                    <div class="field full">
                        <span class="label">Dirección</span>
                        <span class="value" id="view-direccion">-</span>
                    </div>
                    <div class="field">
                        <span class="label">Email</span>
                        <span class="value" id="view-email">-</span>
                    </div>
                </div>

                <div class="btn-row">
                    <button type="button" class="btn btn-primary" id="btn-editar">
                        <i class="fa-solid fa-pen-to-square"></i> Editar perfil
                    </button>
                    <button type="button" class="btn btn-danger" id="btn-cerrar-sesion">
                        <i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión
                    </button>
                </div>
            </div>
        </div>

        <!-- CARD: EDICIÓN -->
        <div class="card hidden" id="card-edicion">
            <div class="card-header">
                <i class="fa-solid fa-pen-to-square orange"></i>
                <h3>Editar información personal</h3>
            </div>
            <div class="card-body">
                <form id="form-edicion">
                    <div class="grid">
                        <div class="field">
                            <label class="label" for="edit-tipo">Tipo de documento</label>
                            <input class="input" id="edit-tipo" type="text" maxlength="50" placeholder="CC, CE, NIT...">
                        </div>
                        <div class="field">
                            <label class="label" for="edit-numero">Número de documento</label>
                            <input class="input" id="edit-numero" type="text" maxlength="50">
                        </div>
                        <div class="field">
                            <label class="label" for="edit-nombre">Nombre <span style="color:#ef4444">*</span></label>
                            <input class="input" id="edit-nombre" type="text" maxlength="255" required>
                        </div>
                        <div class="field">
                            <label class="label" for="edit-apellido">Apellido</label>
                            <input class="input" id="edit-apellido" type="text" maxlength="255">
                        </div>
                        <div class="field">
                            <label class="label" for="edit-telefono">Teléfono</label>
                            <input class="input" id="edit-telefono" type="text" maxlength="50">
                        </div>
                        <div class="field">
                            <label class="label" for="edit-pais-ac">País</label>
                            <div class="pais-ac-wrap">
                                <input class="input" type="text" id="edit-pais-ac" placeholder="Escribe para buscar un país..." autocomplete="off" maxlength="100">
                                <input type="hidden" id="edit-pais">
                            </div>
                        </div>
                        <div class="field full">
                            <label class="label" for="edit-direccion">Dirección</label>
                            <input class="input" id="edit-direccion" type="text" maxlength="255">
                        </div>
                        <div class="field full">
                            <label class="label" for="edit-email">Email</label>
                            <input class="input" id="edit-email" type="email" readonly>
                        </div>
                    </div>

                    <hr class="sep">

                    <!-- Cambio de contraseña -->
                    <p class="label" style="margin-bottom:12px;">Cambiar contraseña <span style="font-weight:400;text-transform:none;font-size:11px;">(dejá vacío para no cambiarla)</span></p>
                    <div class="grid">
                        <div class="field">
                            <label class="label" for="edit-pass-nueva">Nueva contraseña</label>
                            <input class="input" id="edit-pass-nueva" type="password" minlength="6" placeholder="Mín. 6 caracteres">
                        </div>
                        <div class="field">
                            <label class="label" for="edit-pass-confirmar">Confirmar contraseña</label>
                            <input class="input" id="edit-pass-confirmar" type="password" placeholder="Repetir contraseña">
                        </div>
                    </div>

                    <div class="btn-row">
                        <button type="submit" class="btn btn-primary">
                            <i class="fa-solid fa-floppy-disk"></i> Guardar cambios
                        </button>
                        <button type="button" class="btn btn-outline" id="btn-cancelar">
                            <i class="fa-solid fa-xmark"></i> Cancelar
                        </button>
                    </div>
                </form>
            </div>
        </div>

    </main>

    <script src="../js/config.js"></script>
    <script src="../js/countries.js"></script>
    <script>
        const token = sessionStorage.getItem('token') || localStorage.getItem('token');
        const API_URL = (typeof CONFIG !== 'undefined' && CONFIG.API_URL)
            ? CONFIG.API_URL : 'http://localhost:3000/api';

        const estado = { perfil: null };

        const $ = id => document.getElementById(id);

        function mostrarMsg(texto, tipo = '') {
            const el = $('msg-global');
            if (!texto) { el.className = 'msg'; el.textContent = ''; return; }
            el.className = `msg ${tipo}`;
            el.textContent = texto;
            if (tipo === 'success') setTimeout(() => mostrarMsg(''), 4000);
        }

        function iniciales(nombre, apellido) {
            const n = (nombre || '').trim()[0] || '';
            const a = (apellido || '').trim()[0] || '';
            return (n + a).toUpperCase() || '?';
        }

        function textoSeguro(v) {
            if (v === null || v === undefined) return '—';
            const t = String(v).trim();
            return t || '—';
        }

        function pintarPerfil(p) {
            p = p || {};
            const rol = p.rol?.nombre || p.rolNombre || p.rol || '—';

            $('avatar-iniciales').textContent = iniciales(p.nombre, p.apellido);
            $('hero-nombre').textContent = [p.nombre, p.apellido].filter(Boolean).join(' ') || 'Sin nombre';
            $('hero-rol').textContent = textoSeguro(rol);

            $('view-tipo').textContent     = textoSeguro(p.tipoDocumento);
            $('view-numero').textContent   = textoSeguro(p.numeroDocumento);
            $('view-nombre').textContent   = textoSeguro(p.nombre);
            $('view-apellido').textContent = textoSeguro(p.apellido);
            $('view-telefono').textContent = textoSeguro(p.telefono);
            $('view-pais').textContent     = textoSeguro(p.pais);
            $('view-direccion').textContent= textoSeguro(p.direccion);
            $('view-email').textContent    = textoSeguro(p.email);

            $('edit-tipo').value      = p.tipoDocumento || '';
            $('edit-numero').value    = p.numeroDocumento || '';
            $('edit-nombre').value    = p.nombre || '';
            $('edit-apellido').value  = p.apellido || '';
            $('edit-telefono').value  = p.telefono || '';
            $('edit-pais').value      = p.pais || '';
            $('edit-direccion').value = p.direccion || '';
            $('edit-email').value     = p.email || '';
            $('edit-pass-nueva').value = '';
            $('edit-pass-confirmar').value = '';
        }

        function alternar(editando) {
            $('card-lectura').classList.toggle('hidden', editando);
            $('card-edicion').classList.toggle('hidden', !editando);
            if (!editando) mostrarMsg('');
        }

        async function cargarPerfil() {
            if (!token) { window.location.href = '../login.html'; return; }
            try {
                const res = await fetch(`${API_URL}/auth/me`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                if (!res.ok) throw new Error();
                const data = await res.json();
                estado.perfil = data?.usuario || {};
                sessionStorage.setItem('usuario', JSON.stringify(estado.perfil));
                pintarPerfil(estado.perfil);
            } catch {
                mostrarMsg('No se pudo cargar el perfil. Iniciá sesión nuevamente.', 'error');
            }
        }

        $('form-edicion').addEventListener('submit', async (e) => {
            e.preventDefault();
            mostrarMsg('');

            const nuevaPass = $('edit-pass-nueva').value.trim();
            const confirmarPass = $('edit-pass-confirmar').value.trim();

            if (nuevaPass && nuevaPass.length < 6) {
                mostrarMsg('La contraseña debe tener al menos 6 caracteres.', 'error'); return;
            }
            if (nuevaPass && nuevaPass !== confirmarPass) {
                mostrarMsg('Las contraseñas no coinciden.', 'error'); return;
            }

            const payload = {
                TipoDocumento:   $('edit-tipo').value.trim(),
                NumeroDocumento: $('edit-numero').value.trim(),
                NombreUsuario:   $('edit-nombre').value.trim(),
                Apellido:        $('edit-apellido').value.trim(),
                Telefono:        $('edit-telefono').value.trim(),
                Pais:            $('edit-pais').value.trim(),
                Direccion:       $('edit-direccion').value.trim(),
                Email:           $('edit-email').value.trim()
            };

            if (nuevaPass) payload.Password = nuevaPass;

            if (!payload.NombreUsuario || !payload.Email) {
                mostrarMsg('Nombre y email son obligatorios.', 'error'); return;
            }

            try {
                const res = await fetch(`${API_URL}/auth/me`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error();
                const data = await res.json();
                estado.perfil = data?.usuario || estado.perfil;
                sessionStorage.setItem('usuario', JSON.stringify(estado.perfil));
                pintarPerfil(estado.perfil);
                alternar(false);
                mostrarMsg('Perfil actualizado correctamente.', 'success');
            } catch {
                mostrarMsg('No se pudo guardar. Intentá nuevamente.', 'error');
            }
        });

        $('btn-editar').addEventListener('click', () => {
            alternar(true);
            iniciarAutocompletePaises({ inputId: 'edit-pais-ac', hiddenId: 'edit-pais', defaultValue: estado.perfil?.pais || '' });
        });

        $('btn-cancelar').addEventListener('click', () => {
            pintarPerfil(estado.perfil || {});
            alternar(false);
        });

        $('btn-cerrar-sesion').addEventListener('click', () => {
            sessionStorage.clear();
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../login.html';
        });

        $('btn-volver').addEventListener('click', () => {
            try {
                const userData = localStorage.getItem('user') || sessionStorage.getItem('usuario') || '{}';
                const user = JSON.parse(userData);
                window.location.href = user.rol === 1 ? '../index.html' : '../cliente.html';
            } catch {
                window.location.href = '../cliente.html';
            }
        });

        // Reset password por link
        const params = new URLSearchParams(window.location.search);
        const resetToken = params.get('resetToken');
        if (resetToken) {
            document.querySelector('.page').innerHTML = `
                <div class="hero" style="margin-bottom:20px;">
                    <div class="avatar"><i class="fa-solid fa-key"></i></div>
                    <div class="hero-name">Restablecer contraseña</div>
                </div>
                <div id="msg-reset" class="msg"></div>
                <div class="card">
                    <div class="card-header">
                        <i class="fa-solid fa-lock green"></i>
                        <h3>Nueva contraseña</h3>
                    </div>
                    <div class="card-body">
                        <form id="reset-form">
                            <div class="grid">
                                <div class="field">
                                    <label class="label" for="rp-nueva">Nueva contraseña</label>
                                    <input class="input" id="rp-nueva" type="password" placeholder="Mín. 6 caracteres" required>
                                </div>
                                <div class="field">
                                    <label class="label" for="rp-confirmar">Confirmar contraseña</label>
                                    <input class="input" id="rp-confirmar" type="password" placeholder="Repetir contraseña" required>
                                </div>
                            </div>
                            <div class="btn-row">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fa-solid fa-floppy-disk"></i> Establecer contraseña
                                </button>
                            </div>
                        </form>
                    </div>
                </div>`;

            function showReset(txt, tipo) {
                const el = document.getElementById('msg-reset');
                el.className = `msg ${tipo}`; el.textContent = txt;
            }

            document.getElementById('reset-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const p  = document.getElementById('rp-nueva').value.trim();
                const pc = document.getElementById('rp-confirmar').value.trim();
                if (!p || p.length < 6) { showReset('La contraseña debe tener al menos 6 caracteres.', 'error'); return; }
                if (p !== pc) { showReset('Las contraseñas no coinciden.', 'error'); return; }
                try {
                    const res = await fetch(`${API_URL}/auth/cliente-set-password`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token: resetToken, password: p })
                    });
                    const j = await res.json();
                    if (!res.ok) { showReset(j.error || j.message || 'No se pudo establecer la contraseña.', 'error'); return; }
                    showReset('Contraseña establecida. Redirigiendo al login...', 'success');
                    setTimeout(() => { window.location.href = '../login.html'; }, 2500);
                } catch { showReset('Error de red. Intentá nuevamente.', 'error'); }
            });
        } else {
            cargarPerfil();
        }
    </script>
</body>
</html>
